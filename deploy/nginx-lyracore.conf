# /etc/nginx/sites-available/lyracore

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name lyracore.lyraenterprise.co.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name lyracore.lyraenterprise.co.in;

    # SSL — managed by certbot
    ssl_certificate     /etc/letsencrypt/live/lyracore.lyraenterprise.co.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lyracore.lyraenterprise.co.in/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Frontend (Vite build output) ─────────────────────────────────────────
    root /var/www/lyracore/frontend/dist;
    index index.html;

    # SPA fallback — all unknown paths serve index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Backend API proxy ─────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        client_max_body_size 50M;
    }

    # ── Static uploads (quotation PDFs, QC photos) ────────────────────────────
    location /uploads/ {
        alias /var/www/lyracore/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── Company data files (logo, payment QR) ────────────────────────────────
    location /data/ {
        alias /var/www/lyracore/backend/data/;
        expires 7d;
    }

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
