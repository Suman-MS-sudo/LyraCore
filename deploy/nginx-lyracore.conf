# /etc/nginx/sites-available/lyracore
#
# HTTP only — after setup run:
#   sudo certbot --nginx -d yourdomain.com
# to get a free HTTPS cert from Let's Encrypt.

server {
    listen 80;
    server_name _;           # replace _ with your domain or IP, e.g. lyracore.com

    # ── Frontend (Vite build output) ─────────────────────────────────────────
    root /var/www/lyracore/frontend/dist;
    index index.html;

    # SPA fallback — all unknown paths serve index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Backend API proxy ─────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        client_max_body_size 50M;
    }

    # ── Static uploads (quotation PDFs, QC photos) ────────────────────────────
    location /uploads/ {
        alias /var/www/lyracore/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── Company data files (logo, payment QR) ────────────────────────────────
    location /data/ {
        alias /var/www/lyracore/backend/data/;
        expires 7d;
    }

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
